<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Leading vs Trailing Edge Gesture</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Base page (visible behind the shrunk overlay) -->
  <div id="base-page">
    <div class="card" style="background:linear-gradient(135deg,#667eea,#764ba2)">1</div>
    <div class="card" style="background:linear-gradient(135deg,#f093fb,#f5576c)">2</div>
    <div class="card" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">3</div>
    <div class="card" style="background:linear-gradient(135deg,#43e97b,#38f9d7)">4</div>
    <div class="card" style="background:linear-gradient(135deg,#fa709a,#fee140)">5</div>
    <div class="card" style="background:linear-gradient(135deg,#30cfd0,#330867)">6</div>
    <div class="card" style="background:linear-gradient(135deg,#a8edea,#fed6e3)">7</div>
    <div class="card" style="background:linear-gradient(135deg,#5ee7df,#b490ca)">8</div>
  </div>

  <!-- Full-screen overlay viewer -->
  <div id="viewer">
    <!-- Anchor dots live INSIDE the viewer so they drift with the transform -->
    <div id="dot-start" class="anchor-dot"></div>
    <div id="dot-ready" class="anchor-dot"></div>
    <div id="dot-anchor" class="anchor-dot"></div>

    <div id="viewer-content">
      <div class="placeholder-image"></div>
      <h2>Swipe Down to Peek</h2>
      <p>Release to snap back &middot; 100ms prep delay on touch</p>
    </div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-item"><span class="legend-dot dot-start-color"></span> Touch start</div>
    <div class="legend-item"><span class="legend-dot dot-ready-color"></span> Gesture ready</div>
    <div class="legend-item"><span class="legend-dot dot-anchor-color"></span> Anchor (balanced)</div>
  </div>

  <!-- Status indicator -->
  <div id="status">Idle</div>

  <!-- Mode toggle + dots toggle -->
  <div id="controls">
    <div class="segmented">
      <button class="seg-btn active" data-mode="leading">Leading</button>
      <button class="seg-btn" data-mode="balanced">Balanced</button>
      <button class="seg-btn" data-mode="trailing">Trailing</button>
    </div>
    <button id="dots-toggle" class="dots-toggle active" title="Toggle anchor dots">
      <span class="dots-dot"></span>
      <span class="dots-label">Dots</span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
